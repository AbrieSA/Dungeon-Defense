kind = "web"
previewPath = "/"
title = "Sword Survivor"
version = "1.0.0"
id = "artifacts/mob-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24741
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/mob-game run dev"

[services.env]
PORT = "24741"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/mob-game", "run", "build"]
publicDir = "artifacts/mob-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
